name: AkuDon Gold Scanner
on:
  schedule:
    - cron: '*/5 * * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Upgraded to 3.11
      - name: Install Tools
        run: pip install yfinance firebase-admin # Switched ccxt to yfinance
      - name: Execute AkuDon Scan
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python scanner.py
