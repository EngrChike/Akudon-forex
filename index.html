<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkuDon Gold | Professional Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { color: #d4af37; font-size: 26px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        
        #timer-box { font-size: 14px; color: #888; margin-bottom: 15px; padding: 5px 15px; border-radius: 5px; background: #1a1a1a; }
        .fresh { color: #10b981 !important; }
        .expired { color: #ef4444 !important; font-weight: bold; }

        .intel-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .pill { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; font-size: 11px; background: #111; color: #555; font-weight: bold; }
        .pill.active { background: #10b981; color: #fff; border-color: #059669; box-shadow: 0 0 10px #10b981; }

        .terminal-box { background: #161616; width: 100%; max-width: 450px; border-radius: 15px; border: 1px solid #333; padding: 25px; box-sizing: border-box; }
        .price-text { font-size: 32px; font-weight: bold; color: #d4af37; margin: 10px 0; }

        .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; text-align: left; }
        .risk-item { background: #222; padding: 12px; border-radius: 8px; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 18px; font-weight: bold; }

        select, input { background: #000; border: 1px solid #444; color: gold; padding: 10px; width: 100%; border-radius: 5px; margin-top: 5px; font-size: 16px; box-sizing: border-box; }
        .btn-trade { background: #d4af37; color: #000; border: none; padding: 18px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">AKUDON GLOBAL</div>
    <div id="timer-box">Signal Age: <span id="signal-timer">00:00</span></div>

    <div class="intel-container">
        <div id="news-pill" class="pill">NEWS: OK</div>
        <div id="trend-pill" class="pill">HTF TREND</div>
        <div id="zone-pill" class="pill">BANK ZONE</div>
    </div>

    <div class="terminal-box">
        <div class="label">Asset Config</div>
        <select id="asset-selector" onchange="calculateLot()">
            <option value="gold">GOLD (XAU/USD)</option>
            <option value="forex">EUR/USD or GBP/USD</option>
            <option value="jpy">YEN PAIRS (GBPJPY/USDJPY)</option>
        </select>

        <div id="signal-type" style="font-size: 20px; color: #888; margin-top: 15px;">WAITING FOR SIGNAL...</div>
        <div class="price-text" id="entry-price">0.0000</div>
        
        <div class="risk-grid">
            <div class="risk-item"><div class="label">Stop Loss</div><div class="val" id="sl-val" style="color:#ef4444;">-</div></div>
            <div class="risk-item"><div class="label">Take Profit</div><div class="val" id="tp-val" style="color:#10b981;">-</div></div>
        </div>

        <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <div class="label">Account Balance ($)</div>
            <input type="number" id="balance" value="1000" oninput="calculateLot()">
            <div class="risk-grid">
                <div class="risk-item"><div class="label">Recommended Lot</div><div class="val" id="lot-size" style="color:gold;">0.00</div></div>
                <div class="risk-item"><div class="label">Risk (1%)</div><div id="risk-cash" class="val" style="color:#888;">$10.00</div></div>
            </div>
        </div>

        <button class="btn-trade" onclick="launchMT5()">🚀 EXECUTE ON MT5 APP</button>
    </div>

    <audio id="cashSound" src="https://www.soundjay.com/misc/sounds/cash-register-05.mp3"></audio>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "akudon-gold",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        let signalStartTime = null;

        // --- 2. NOTIFICATION LISTENER ---
        messaging.onMessage((payload) => {
            const type = payload.notification.title.includes("BUY") ? "BUY" : "SELL";
            const price = parseFloat(payload.notification.body.split("at ")[1]);
            const pairName = payload.notification.body.split("on ")[1].split(" at")[0];

            document.getElementById('cashSound').play();
            signalStartTime = new Date();
            startTimer();

            // Auto-detect asset type for math
            if (pairName.includes("GOLD")) document.getElementById('asset-selector').value = "gold";
            else if (pairName.includes("JPY")) document.getElementById('asset-selector').value = "jpy";
            else document.getElementById('asset-selector').value = "forex";

            updateUI(type, price, pairName);
        });

        // --- 3. CORE LOGIC ---
        function updateUI(type, price, pair) {
            document.getElementById('signal-type').innerText = type + " " + pair;
            document.getElementById('signal-type').style.color = type === "BUY" ? "#10b981" : "#ef4444";
            document.getElementById('entry-price').innerText = price;

            const assetType = document.getElementById('asset-selector').value;
            let slDist = (assetType === "gold") ? 3.0 : 0.0030; // Default 30 Pips
            if (assetType === "jpy") slDist = 0.30; 

            let sl = type === "BUY" ? price - slDist : price + slDist;
            let tp = type === "BUY" ? price + (slDist * 3) : price - (slDist * 3);

            document.getElementById('sl-val').innerText = sl.toFixed(assetType === "forex" ? 4 : 2);
            document.getElementById('tp-val').innerText = tp.toFixed(assetType === "forex" ? 4 : 2);
            
            document.getElementById('trend-pill').classList.add('active');
            document.getElementById('zone-pill').classList.add('active');
            calculateLot();
        }

        function calculateLot() {
            const balance = document.getElementById('balance').value;
            const assetType = document.getElementById('asset-selector').value;
            const riskAmount = balance * 0.01;
            let lot = (assetType === "gold") ? riskAmount / 300 : riskAmount / 300; // Simplified 30 pip math
            document.getElementById('lot-size').innerText = Math.max(0.01, lot).toFixed(2);
            document.getElementById('risk-cash').innerText = "$" + riskAmount.toFixed(2);
        }

        function startTimer() {
            setInterval(() => {
                if (!signalStartTime) return;
                const now = new Date();
                const diff = Math.floor((now - signalStartTime) / 1000);
                const mins = Math.floor(diff / 60).toString().padStart(2, '0');
                const secs = (diff % 60).toString().padStart(2, '0');
                const timerDisplay = document.getElementById('signal-timer');
                timerDisplay.innerText = `${mins}:${secs}`;
                timerDisplay.className = (diff < 300) ? "fresh" : (diff >= 900 ? "expired" : "");
            }, 1000);
        }

        function launchMT5() {
            window.location.replace("metatrader5://");
            setTimeout(() => { window.open("https://www.metatrader5.com/en/terminal", '_blank'); }, 600);
        }
    </script>
</body>
</html>
