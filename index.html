<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkuDon Gold | Multi-Asset Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { color: #d4af37; font-size: 26px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .terminal-box { background: #161616; width: 100%; max-width: 450px; border-radius: 15px; border: 1px solid #333; padding: 25px; box-sizing: border-box; margin-top: 10px; }
        .price-text { font-size: 32px; font-weight: bold; color: #d4af37; margin: 10px 0; }
        .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; text-align: left; }
        .risk-item { background: #222; padding: 12px; border-radius: 8px; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .val { font-size: 18px; font-weight: bold; }
        
        select, input { background: #000; border: 1px solid #444; color: gold; padding: 10px; width: 100%; border-radius: 5px; margin-top: 5px; font-size: 16px; box-sizing: border-box; }
        .btn-trade { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">AKUDON GLOBAL</div>
    <div id="status" style="color: #666; font-size: 12px;">SYSTEM READY</div>

    <div class="terminal-box">
        <div class="label">Select Asset (Auto-sets Math)</div>
        <select id="asset-selector" onchange="calculateLot()">
            <option value="gold">GOLD (XAU/USD)</option>
            <option value="forex">EUR/USD or GBP/USD</option>
            <option value="jpy">YEN PAIRS (GBPJPY/USDJPY)</option>
        </select>

        <div id="signal-type" style="font-size: 18px; color: #888; margin-top:15px;">WAITING...</div>
        <div class="price-text" id="entry-price">0.0000</div>
        
        <div class="risk-grid">
            <div class="risk-item"><div class="label">Stop Loss</div><div class="val" id="sl-val" style="color:#ef4444;">-</div></div>
            <div class="risk-item"><div class="label">Take Profit</div><div class="val" id="tp-val" style="color:#10b981;">-</div></div>
        </div>

        <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px;">
            <div class="label">Account Balance ($)</div>
            <input type="number" id="balance" value="1000" oninput="calculateLot()">
            
            <div class="risk-grid">
                <div class="risk-item"><div class="label">Recommended Lot</div><div class="val" id="lot-size" style="color:gold;">0.00</div></div>
                <div class="risk-item"><div class="label">Risk Amount</div><div id="risk-cash" class="val" style="color:#888;">$10.00</div></div>
            </div>
        </div>

        <button class="btn-trade" onclick="window.open('https://www.metatrader5.com/')">OPEN MT5</button>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = { /* Paste your config here */ };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        messaging.onMessage((payload) => {
            const type = payload.notification.title.includes("BUY") ? "BUY" : "SELL";
            const price = parseFloat(payload.notification.body.split("at ")[1]);
            const pairName = payload.notification.body.split("on ")[1].split(" at")[0];

            // AUTO-SWITCH SELECTOR BASED ON PAIR NAME
            if (pairName.includes("GOLD")) document.getElementById('asset-selector').value = "gold";
            else if (pairName.includes("JPY")) document.getElementById('asset-selector').value = "jpy";
            else document.getElementById('asset-selector').value = "forex";

            updateUI(type, price, pairName);
        });

        function updateUI(type, price, pair) {
            document.getElementById('signal-type').innerText = type + " " + pair;
            document.getElementById('signal-type').style.color = type === "BUY" ? "#10b981" : "#ef4444";
            document.getElementById('entry-price').innerText = price;

            // Stop Loss Distance (Pips)
            const assetType = document.getElementById('asset-selector').value;
            let slDist = (assetType === "gold") ? 3.0 : 0.0030; // 30 Pips
            if (assetType === "jpy") slDist = 0.30; 

            let sl = type === "BUY" ? price - slDist : price + slDist;
            let tp = type === "BUY" ? price + (slDist * 3) : price - (slDist * 3);

            document.getElementById('sl-val').innerText = sl.toFixed(assetType === "forex" ? 4 : 2);
            document.getElementById('tp-val').innerText = tp.toFixed(assetType === "forex" ? 4 : 2);
            
            calculateLot();
        }

        function calculateLot() {
            const balance = document.getElementById('balance').value;
            const assetType = document.getElementById('asset-selector').value;
            const riskAmount = balance * 0.01; // 1% Risk

            let lot;
            if (assetType === "gold") {
                // Gold: $1 per 0.01 move per standard lot
                lot = riskAmount / 300; 
            } else if (assetType === "forex") {
                // Forex: $10 per pip per standard lot
                lot = riskAmount / (30 * 10);
            } else {
                // JPY: Approx $7-9 per pip, we use $8 for safety
                lot = riskAmount / (30 * 8);
            }

            document.getElementById('lot-size').innerText = Math.max(0.01, lot).toFixed(2);
            document.getElementById('risk-cash').innerText = "$" + riskAmount.toFixed(2);
        }
    </script>
</body>
</html>
