<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AkuDon Terminal | Executive Trader</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
:root { --bg: #05070a; --glass: rgba(22, 27, 34, 0.75); --border: rgba(255, 255, 255, 0.1); --accent: #38bdf8; --success: #10b981; --danger: #f43f5e; --text: #e2e8f0; }
body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; }
.glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); margin-bottom: 20px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.logo { font-weight: 800; font-size: 24px; color: var(--accent); }
.main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
@media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }
input, select { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; font-family: 'JetBrains Mono'; }
.btn-prime { background: linear-gradient(135deg, var(--accent), #0284c7); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; }
.badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
.badge-buy { background: rgba(16, 185, 129, 0.2); color: var(--success); }
.badge-sell { background: rgba(244, 63, 94, 0.2); color: var(--danger); }
#boot-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center; }
</style>
</head>
<body>

<audio id="bank-alert" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

<div id="boot-overlay">
<div class="glass-card" style="text-align:center;">
<h2 style="color:var(--accent);">AKUDON TERMINAL V3</h2>
<button onclick="startSystem()" class="btn-prime">INITIALIZE SYSTEM</button>
</div>
</div>

<header>
<div class="logo">AKU<span>DON</span> TERMINAL</div>
<div style="text-align: right;">
<div id="clock" style="font-family: 'JetBrains Mono'; font-weight: 600;">00:00:00</div>
<div style="font-size: 10px; color: #94a3b8;">LAGOS/ABIDJAN</div>
</div>
</header>

<div class="main-layout">
<div class="left-section">
<div id="signal-box" class="glass-card" style="border: 2px solid #334155;">
<div style="display: flex; justify-content: space-between;">
<div>
<h4 id="bot-status" style="margin:0; font-size:12px; color:#94a3b8;">SYSTEM: SCANNING</h4>
<h2 id="signal-text" style="margin:10px 0; font-size:28px;">AWAITING BANK ZONE</h2>
</div>
<div id="signal-icon" style="font-size:40px;">📡</div>
</div>
<div style="display:flex; gap:10px; font-size:10px; margin-top:10px;">
<span id="c1">🔴 NEWS</span> <span id="c2">🔴 TREND</span> <span id="c3">🔴 ZONE</span>
</div>
</div>

<div class="glass-card">
<div style="display: flex; gap: 15px; flex-wrap: wrap;">
<input type="number" id="bal" value="1000" placeholder="Balance" oninput="runRisk()">
<input type="number" id="risk" value="1" placeholder="Risk %" oninput="runRisk()">
<input type="number" id="sl_pips" value="20" placeholder="SL Pips" oninput="runRisk()">
<div style="background: rgba(56, 189, 248, 0.1); padding: 10px; border-radius: 8px;">
LOT: <strong id="lot_out" style="color:var(--accent);">0.05</strong>
</div>
</div>
<div style="display: flex; gap: 10px; margin-top: 15px;">
<input type="text" id="p" placeholder="PAIR" style="flex:1">
<select id="dir"><option>BUY</option><option>SELL</option></select>
<input type="number" id="entry" placeholder="ENTRY" style="flex:1" step="0.0001">
<input type="number" id="st_l" placeholder="SL" style="flex:1" step="0.0001">
<input type="number" id="t_p" placeholder="TP" style="flex:1" step="0.0001">
<button class="btn-prime" onclick="addTrade()">LOG</button>
</div>
</div>

<div class="glass-card" style="height: 500px; padding: 10px;">
<div id="tv_chart" style="height: 100%;"></div>
</div>
</div>

<div class="right-section">
<div class="glass-card" style="height: 200px; padding: 10px;">
<div class="tradingview-widget-container" style="height: 100%;">
<div class="tradingview-widget-container__widget"></div>
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
{ "width": "100%", "height": "100%", "defaultColumn": "overview", "market": "forex", "colorTheme": "dark", "symbols": { "groups": [{"name": "Majors", "symbols": [{"name": "FX_IDC:EURUSD"},{"name": "FX_IDC:GBPUSD"}]}] }}
</script>
</div>
</div>

<div class="glass-card">
<div style="display:flex; justify-content:space-between;">
<h4>JOURNAL</h4>
<button onclick="downloadPDF()" style="background:none; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-size:10px; border-radius:4px;">WEEKEND PDF</button>
</div>
<table style="width:100%; font-size:12px;">
<tbody id="j_body"></tbody>
</table>
</div>
</div>
</div>

<script>
const alarm = document.getElementById('bank-alert');
let trades = JSON.parse(localStorage.getItem('akuTrades')) || [];

function startSystem() {
alarm.play().then(() => { alarm.pause(); document.getElementById('boot-overlay').style.display='none'; });
new TradingView.widget({ "autosize": true, "symbol": "FX:EURUSD", "interval": "60", "timezone": "Africa/Abidjan", "theme": "dark", "container_id": "tv_chart" });
renderJournal();
}

function runRisk() {
let lot = (document.getElementById('bal').value * (document.getElementById('risk').value/100)) / (document.getElementById('sl_pips').value * 10);
document.getElementById('lot_out').innerText = lot.toFixed(2);
}

function addTrade() {
const t = {
pair: document.getElementById('p').value, dir: document.getElementById('dir').value,
ent: document.getElementById('entry').value, sl: document.getElementById('st_l').value,
tp: document.getElementById('t_p').value, date: new Date().toLocaleDateString()
};
trades.push(t);
localStorage.setItem('akuTrades', JSON.stringify(trades));
renderJournal();
// Simulation of alarm
alarm.play();
}

function renderJournal() {
document.getElementById('j_body').innerHTML = trades.map(t => `
<tr style="border-bottom:1px solid var(--border)">
<td>${t.pair}</td>
<td class="${t.dir == 'BUY' ? 'badge-buy' : 'badge-sell'}">${t.dir}</td>
<td>${t.ent}</td>
</tr>`).join('');
}

function downloadPDF() {
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text("AkuDon Weekend Performance Report", 14, 15);
const rows = trades.map(t => [t.date, t.pair, t.dir, t.ent, t.sl, t.tp]);
doc.autoTable({ head: [['Date', 'Pair', 'Type', 'Entry', 'SL', 'TP']], body: rows, startY: 20 });
doc.save(`AkuDon_Report_${new Date().toLocaleDateString()}.pdf`);
}

setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
</script>
</body>
</html>
