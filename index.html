<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkuDon Gold | Signal Intelligence</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .header { color: #d4af37; font-size: 24px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* The 3 Criteria Boxes */
        .intelligence-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .pill { padding: 10px 20px; border-radius: 20px; border: 1px solid #444; background: #1a1a1a; color: #666; font-weight: bold; transition: 0.3s; }
        .pill.active { background: #10b981; color: #fff; border-color: #059669; box-shadow: 0 0 10px #10b981; }

        .signal-display { background: #1a1a1a; padding: 30px; border-radius: 15px; border-left: 5px solid #d4af37; margin: 20px auto; max-width: 400px; }
        .btn-trade { background: #d4af37; color: #000; border: none; padding: 15px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">AKUDON GOLD TERMINAL</div>

    <div id="status" style="color: #666; font-size: 12px;">Connecting to Market...</div>

    <div class="intelligence-container">
        <div id="news-pill" class="pill">NO HIGH NEWS</div>
        <div id="trend-pill" class="pill">HTF TREND ALIGN</div>
        <div id="zone-pill" class="pill">ZONE CONTACT</div>
    </div>

    <div class="signal-display">
        <h2 id="signal-type" style="margin:0; color: #888;">WAITING...</h2>
        <p id="signal-details" style="color: #aaa;">No active bank moves detected.</p>
    </div>

    <button class="btn-trade" onclick="window.open('https://www.metatrader5.com/')">OPEN MT5 TERMINAL</button>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "akudon-gold",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // --- 2. SIGNAL LOGIC ---
        messaging.onMessage((payload) => {
            const signal = payload.data.signal; // BUY or SELL
            const pair = payload.data.pair;

            document.getElementById('signal-type').innerText = signal + " DETECTED";
            document.getElementById('signal-type').style.color = signal === "BUY" ? "#10b981" : "#f43f5e";
            document.getElementById('signal-details').innerText = "Bank Activity on " + pair;

            // AUTO-ACTIVATE THE PILLS (Simulated verification)
            // In a real trade, you check these before clicking
            activatePills();
        });

        function activatePills() {
            document.getElementById('news-pill').classList.add('active');
            document.getElementById('trend-pill').classList.add('active');
            document.getElementById('zone-pill').classList.add('active');
            document.getElementById('status').innerText = "STRATEGY CONFIRMED: HIGH PROBABILITY";
        }

        // Request Permission
        messaging.requestPermission().then(() => {
            document.getElementById('status').innerText = "AKUDON SCANNER ACTIVE";
        });
    </script>
</body>
</html>
